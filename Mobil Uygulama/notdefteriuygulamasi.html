<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Not Defteri</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#1e1e2f;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }

    .app{
      width:400px;
      background:#2b2b40;
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    textarea{
      width:100%;
      height:120px;
      border:none;
      border-radius:10px;
      padding:10px;
      resize:none;
      outline:none;
      font-size:16px;
    }

    button{
      width:100%;
      margin-top:10px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4cafef;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#2196f3;
    }

    .notes{
      margin-top:20px;
      max-height:250px;
      overflow-y:auto;
    }

    .note{
      background:#3a3a55;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
      position:relative;
    }

    .delete{
      position:absolute;
      right:10px;
      top:10px;
      background:red;
      border:none;
      padding:5px 8px;
      border-radius:5px;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>📝 Not Defteri</h1>

    <textarea id="noteInput" placeholder="Notunu yaz..."></textarea>

    <button onclick="addNote()">Not Ekle</button>

    <div class="notes" id="notes"></div>
  </div>

  <script>
    const notesContainer = document.getElementById("notes");

    // Sayfa açılınca notları yükle
    window.onload = function() {
      loadNotes();
    };

    function addNote() {
      const input = document.getElementById("noteInput");
      const text = input.value.trim();

      if(text === ""){
        alert("Boş not eklenemez!");
        return;
      }

      let notes = JSON.parse(localStorage.getItem("notes")) || [];
      notes.push(text);

      localStorage.setItem("notes", JSON.stringify(notes));

      input.value = "";

      loadNotes();
    }

    function loadNotes() {
      let notes = JSON.parse(localStorage.getItem("notes")) || [];

      notesContainer.innerHTML = "";

      notes.forEach((note, index) => {
        notesContainer.innerHTML += `
          <div class="note">
            ${note}
            <button class="delete" onclick="deleteNote(${index})">
              Sil
            </button>
          </div>
        `;
      });
    }

    function deleteNote(index) {
      let notes = JSON.parse(localStorage.getItem("notes")) || [];

      notes.splice(index, 1);

      localStorage.setItem("notes", JSON.stringify(notes));

      loadNotes();
    }
  </script>

</body>
</html>
